[monitor]
interval_seconds = 5
ready_delay_seconds = 12
missing_grace_seconds = 10
notify_existing = true
needs_input_repeat_seconds = 1800
capture_lines = 80
tmux_fallback_interval_seconds = 6
tmux_fallback = true
# Mark a running session as "possibly stalled" in the UI after this many
# seconds without terminal, rollout, or transcript activity.
activity_stale_seconds = 600
# Retain delivered notifications and stale session history for this many days.
# Pending notification retries are never pruned by retention cleanup.
retention_days = 30
process_exit_notifications = true
ignore_tmux_sessions = ["agent-watch"]

[ui]
# Conversation text may appear on shared terminals, recordings, or screenshots,
# so public installations keep the preview disabled by default. Press p in the
# UI to show or hide it temporarily.
conversation_preview = false

# Optional protection for session history in ephemeral containers. Active files
# stay on fast local storage; a background worker incrementally copies only
# Codex/Claude transcripts plus a consistent Agent Watch database snapshot.
# Authentication and provider settings are never included. Use a private,
# persistent directory outside the source checkout. AGENT_WATCH_PERSIST_DIR can
# supply this path at runtime and enables persistence without editing this file.
[persistence]
enabled = false
directory = ""
# directory = "/absolute/path/to/private/agent-watch-history"
interval_seconds = 300
restore_on_start = true
backup_on_shutdown = true

[notifications]
console = true
tmux = true
desktop = false
timeout_seconds = 6
include_cwd = false
# Do not send prompts, commands, or response excerpts remotely by default.
include_message_preview = false
# Do not send absolute tmux socket paths or pane IDs to remote providers by
# default.
include_tmux_socket = false
# Enable only when a trusted self-hosted endpoint cannot use TLS. This permits
# notification data to be sent over plaintext HTTP.
allow_insecure_http = false

# Show native toasts inside Cursor/VS Code through the companion extension.
# Leave socket empty unless the extension uses a custom agentWatch.socketPath.
[notifications.cursor]
enabled = false
socket = ""
# Explicitly opt in to a bounded latest-user-prompt excerpt in Cursor toasts.
include_prompt = false

# A custom command receives one JSON object on stdin and is never invoked
# through a shell. Prefer an absolute executable path.
[notifications.command]
argv = []
# argv = ["/usr/local/bin/my-notifier"]

# Generic JSON POST webhook.
[notifications.webhook]
url = ""
bearer_token = ""

# Lightweight mobile notifications. The URL must include the topic, for example:
# https://ntfy.sh/a-long-random-private-topic
[notifications.ntfy]
url = ""
token = ""
priority = "high"

[notifications.telegram]
bot_token = ""
chat_id = ""

# Bark accepts a complete push URL.
[notifications.bark]
url = ""
