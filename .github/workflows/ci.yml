name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build

      - name: Install wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke-test installed command
        run: |
          test "$(agent-watch --version)" = "agent-watch 0.2.0"
          cd /tmp
          python -I -m agent_watch --version
          agent-watch --state-dir "$RUNNER_TEMP/agent-watch-state" status --json

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
